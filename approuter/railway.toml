# Railway Config as Code for approuter service.
# Set service Root Directory to "approuter". Build context = repo root.
# RAILWAY_DOCKERFILE_PATH=approuter/Dockerfile (set in service variables if needed)
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/approuter/openapi.json"
restartPolicyType = "ALWAYS"
