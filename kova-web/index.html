<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kova</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; width: 100%; background: #1a1a1a; }
    canvas { display: block; width: 100%; height: 100%; }
    .centered { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #909090; }
  </style>
</head>
<body>
  <div id="loading" class="centered">Loading...</div>
  <script type="module">
    import init from "./dist/kova_web.js";
    init().then(() => {
      const el = document.getElementById("loading");
      if (el) el.style.display = "none";
    });
  </script>
</body>
</html>
